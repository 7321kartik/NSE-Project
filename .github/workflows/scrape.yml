name: Daily NSE Data Scrape

on:
  schedule:
    # Runs at 11:00 UTC (4:30 PM IST) Monday to Friday
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests nselib

    - name: Run Scraper
      run: |
        python fetch_data.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add public/market_data.json
        # Only commit and push if data has changed
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update daily market data [skip ci]" && git push)
